name: IceHost Hourly KeepAlive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Checkout private repo (gunqio/zhiyong)
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PAT }}
          path: zhiyong
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1

      # (可选) 调试：列出文件，确认脚本位置
      - name: List files for debug
        run: |
          echo "=== Main repo root ==="
          ls -la
          echo "=== zhiyong repo ==="
          ls -la zhiyong/

      - name: Run check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: cd zhiyong && python icehost_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-debug-screenshot
          path: zhiyong/icehost_debug_screenshot.png   # 假设脚本在zhiyong目录下生成截图
          if-no-files-found: ignore
